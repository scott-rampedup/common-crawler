<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up · Common Crawler</title>
  <link rel="icon" type="image/svg+xml" href="/ui/favicon.svg" />
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-card wide">
    <img class="auth-logo" src="/ui/logo.png" alt="Common Crawler" onerror="this.style.display='none'" />
    <h1>Create an account</h1>
    <p class="auth-sub">New accounts are reviewed and activated by an administrator before you can sign in.</p>
    <form id="signupForm" class="auth-form">
      <div class="auth-grid">
        <label>First Name<input id="first" type="text" required /></label>
        <label>Last Name<input id="last" type="text" required /></label>
        <label>Company<input id="company" type="text" /></label>
        <label>Title<input id="title" type="text" /></label>
        <label>Email Address<input id="email" type="email" required /></label>
        <label>Phone<input id="phone" type="tel" /></label>
        <label>Username<input id="username" type="text" autocomplete="username" required /></label>
        <label>Password<input id="password" type="password" autocomplete="new-password" required /></label>
      </div>
      <label class="auth-check">
        <input id="agree" type="checkbox" />
        <span>I have read and agree to the
          <a href="/privacy" target="_blank" rel="noopener">Privacy Policy</a> and
          <a href="/terms" target="_blank" rel="noopener">Terms of Use</a>.</span>
      </label>
      <p id="msg" class="auth-msg"></p>
      <button class="primary" type="submit">Sign up</button>
    </form>
    <div class="auth-links"><a href="/login">Back to sign in</a></div>
  </div>
  <script src="/ui/signup.js"></script>
</body>
</html>
