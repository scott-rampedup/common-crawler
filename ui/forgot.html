<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · Common Crawler</title>
  <link rel="icon" type="image/svg+xml" href="/ui/favicon.svg" />
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <img class="auth-logo" src="/ui/logo.png" alt="Common Crawler" onerror="this.style.display='none'" />
    <h1>Forgot password</h1>
    <p class="auth-sub">
      Password resets are handled by an administrator. Please contact your administrator and
      they can reset your password for you, then share the new temporary password.
    </p>
    <div class="auth-links"><a href="/login">Back to sign in</a></div>
  </div>
</body>
</html>
