# fly.toml app configuration file generated for common-crawler on 2026-06-08T18:37:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'common-crawler'
primary_region = 'ewr'

[build]

[env]
  DATA_DIR = '/data'
  DEMO_MODE = 'false'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
