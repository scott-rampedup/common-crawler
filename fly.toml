# Fly.io config for common-crawler.
app = 'common-crawler'
primary_region = 'ewr'   # must match the existing 'data' volume's region

[build]

[env]
  DATA_DIR = '/data'
  DEMO_MODE = 'false'
  NODE_OPTIONS = '--max-old-space-size=6144'   # let V8 use the 8GB box (default ~2GB caused SIGABRT)
  LIVE_MAX_PAGES = '300'        # max pages the live crawler fetches per domain (sitemap-driven)
  DOMAIN_CONCURRENCY = '48'     # total domains/URLs in flight (safe now: rotating proxy IPs)
  IN_SITE_CONCURRENCY = '4'     # how many pages from one site to fetch at once
  HOST_CONCURRENCY = '3'        # max simultaneous requests to any single host (stays polite per site)
  CC_CONCURRENCY = '1'          # global Common Crawl request limit (keep low: shared service)
  HTML_MAX_KB = '1024'          # cap HTML page size we download/parse (KB)

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 3000          # our Node server listens on 3000 (NOT Fly's default 8080)
  force_https = true
  auto_stop_machines = 'off'    # keep the machine on so background jobs keep running
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '8gb'               # headroom for high concurrency + the wireless-block table
  cpu_kind = 'performance'     # dedicated vCPUs (not throttled) for sustained crawl throughput
  cpus = 4
